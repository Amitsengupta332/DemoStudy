<section id="contact" class="bg-white py-10 lg:py-14">
  <div class="max-w-[1320px] mx-auto px-4 sm:px-6 lg:px-8">

    <div class="bg-[#244b93] rounded-b-[18px] lg:rounded-b-[22px] px-5 sm:px-8 lg:px-14 py-12 lg:py-16">
      <div class="grid grid-cols-1 lg:grid-cols-[40%_60%] gap-10 lg:gap-12 items-center">

        <!-- Left Image -->
        <div class="flex justify-center lg:justify-start">
          <div class="w-full max-w-[420px] h-[420px] lg:h-[490px] rounded-[24px] overflow-hidden">
            <img
              src="/images/overseas-education-consultants.webp"
              alt="Graduate student consultation"
              class="w-full h-full object-cover object-center"
            />
          </div>
        </div>

        <!-- Right Form -->
        <div>
          <!-- Heading -->
          <h2 class="text-white text-[34px] sm:text-[42px] lg:text-[44px] leading-tight font-normal mb-9">
            Let
            <span class="relative inline-block font-extrabold">
              Our Team
              <span class="absolute left-1/2 -translate-x-1/2 -bottom-3 w-[155px] h-[12px]">
                <svg viewBox="0 0 260 22" class="w-full h-full" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M4 10C72 3 167 3 256 8" stroke="#ff402f" stroke-width="4" stroke-linecap="round" />
                  <path d="M20 18C88 13 168 12 236 15" stroke="#ff402f" stroke-width="4" stroke-linecap="round" />
                </svg>
              </span>
            </span>
            Reach Out To You
          </h2>

          <form action="#" method="POST" class="space-y-7">

            <!-- Row 1 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label for="firstName" class="block mb-3 text-white text-[13px] font-medium">
                  First Name
                </label>
                <input
                  id="firstName"
                  type="text"
                  name="firstName"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-transparent px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                />
              </div>

              <div>
                <label for="lastName" class="block mb-3 text-white text-[13px] font-medium">
                  Last Name
                </label>
                <input
                  id="lastName"
                  type="text"
                  name="lastName"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-transparent px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                />
              </div>
            </div>

            <!-- Row 2 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label for="email" class="block mb-3 text-white text-[13px] font-medium">
                  Email ID
                </label>
                <input
                  id="email"
                  type="email"
                  name="email"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-transparent px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                />
              </div>

              <div>
                <label for="mobile" class="block mb-3 text-white text-[13px] font-medium">
                  Mobile Number
                </label>
                <input
                  id="mobile"
                  type="tel"
                  name="mobile"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-transparent px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                />
              </div>
            </div>

            <!-- Row 3 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label for="destination" class="block mb-3 text-white text-[13px] font-medium">
                  Your preferred study destination
                </label>
                <select
                  id="destination"
                  name="destination"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-[#244b93] px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                >
                  <option value="">Select Destination</option>
                  <option value="australia">Australia</option>
                  <option value="uk">UK</option>
                  <option value="usa">USA</option>
                  <option value="canada">Canada</option>
                </select>
              </div>

              <div>
                <label for="course" class="block mb-3 text-white text-[13px] font-medium">
                  Course
                </label>
                <input
                  id="course"
                  type="text"
                  name="course"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-transparent px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                />
              </div>
            </div>

            <!-- Row 4 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label for="month" class="block mb-3 text-white text-[13px] font-medium">
                  When do you plan to study?
                </label>
                <select
                  id="month"
                  name="month"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-[#244b93] px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                >
                  <option value="">Select Month</option>
                  <option value="january">January</option>
                  <option value="february">February</option>
                  <option value="march">March</option>
                  <option value="april">April</option>
                  <option value="may">May</option>
                  <option value="june">June</option>
                  <option value="july">July</option>
                  <option value="august">August</option>
                  <option value="september">September</option>
                  <option value="october">October</option>
                  <option value="november">November</option>
                  <option value="december">December</option>
                </select>
              </div>

              <div>
                <label for="year" class="block mb-3 text-white text-[13px] font-medium">
                  Your preferred year
                </label>
                <select
                  id="year"
                  name="year"
                  class="w-full h-[46px] rounded-[9px] border border-white/80 bg-[#244b93] px-4 text-white outline-none focus:border-white focus:ring-2 focus:ring-white/20"
                >
                  <option value="">Select Year</option>
                  <option value="2026">2026</option>
                  <option value="2027">2027</option>
                  <option value="2028">2028</option>
                </select>
              </div>
            </div>

            <!-- Consent -->
            <label class="flex items-start gap-3 text-white text-[13px] sm:text-[14px] leading-relaxed cursor-pointer">
              <input
                type="checkbox"
                checked
                class="mt-1 w-4 h-4 rounded border-white/80 bg-transparent accent-[#244b93]"
              />
              <span>
                I consent to receiving Calls, WhatsApp, Email and Google RCS from GlobalPath Australia to assist with this enquiry.
              </span>
            </label>

            <!-- Button -->
            <button
              type="submit"
              class="h-[44px] px-5 rounded-[9px] border border-white text-white text-[14px] font-extrabold hover:bg-white hover:text-[#244b93] transition"
            >
              Submit
            </button>

          </form>
        </div>

      </div>
    </div>

  </div>
</section>
